services:
###########################################
#             SERVICES                    #
###########################################

  # gateway
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: build/Dockerfile
    container_name: api-gateway
    environment:
      - HTTP_PORT=8080
      - ADMIN_HTTP_PORT=8081
      - GRPC_PORT=7002
      - AD_SERVICE_ADDR=ad-service:7002
      - ORDER_SERVICE_ADDR=order-service:7002
    ports:
      - "8080:8080"   # HTTP (direct, bypass nginx for debugging)
      - "7002:7002"   # gRPC
      - "8081:8081"   # admin/healthcheck
    depends_on:
      order-service:
        condition: service_healthy   # service_healthy > service_started always
        restart: true
      ad-service:
        condition: service_healthy
        restart: true
    # For local scaling: docker compose up --scale api-gateway=3
    stop_grace_period: 40s           # must be > graceful.timeout in config.yaml
    healthcheck:
      # Use the app's own readiness endpoint directly
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthcheck/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s              # give app time to init before first probe
    labels:
      - autoheal=true
    networks:
      - app-network




###########################################
#             INFRASTRUCTURE              #
###########################################
  nginx:
    image: nginx:1.28-alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy    # not service_started
        restart: true
    networks:
      - app-network

  autoheal:
    image: willfarrell/autoheal:1.2.0
    container_name: autoheal
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal # Watch only containers with the label autoheal=true
      - AUTOHEAL_INTERVAL=5               # Check every 5 seconds
    networks:
      - app-network

networks:
  app-network:
    driver: bridge