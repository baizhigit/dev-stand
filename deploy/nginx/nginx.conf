events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 30;

    # Security
    server_tokens off;              # hides nginx version from response headers
    client_max_body_size 10m;       # explicit limit — default 1MB causes silent 413 errors

    # Rate limiting: 10 req/s per IP, 10MB zone
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Docker stdout/stderr — correct for containerized nginx
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Docker's internal DNS — enables round-robin across scaled containers
    resolver 127.0.0.11 valid=5s;

    upstream api_gateway {
        server api-gateway:8080;
        # With --scale api-gateway=3, Docker DNS returns all IPs → nginx round-robins
    }

    server {
        listen 80;

        # Timeouts — tuned to realistic values, not arbitrarily large numbers
        proxy_connect_timeout  5s;  # time to establish connection 
        proxy_send_timeout    10s;  # time to send request to backend
        proxy_read_timeout    30s;  # match to your actual p99 response time

        # Pass real client info to the Go service
        # Required for rate limiting, audit logs, and geo-blocking in the app
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # nginx-level healthcheck — instant, doesn't hit the app
        # Use for nginx's own liveness probe
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # App readiness proxied to the admin port
        location /healthcheck/ {
            proxy_pass http://api-gateway:8081;
        }

        # All API traffic with rate limiting
        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://api_gateway;
        }
    }
}