version: v2
modules:
  - path: api
lint:
  use:
    - STANDARD    # enforces naming conventions, casing, field presence
breaking:
  use:
    - FILE        # adding fields is OK, removing/renaming = CI failure
deps:
  - buf.build/googleapis/googleapis          # google.api.http, google.type.*
  - buf.build/grpc-ecosystem/grpc-gateway    # protoc-gen-openapiv2 options