version: v2
clean: true   # removes stale generated files before regenerating
plugins:
  # 1. Go message structs
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: internal/pkg/pb
    opt: paths=source_relative

  # 2. gRPC server/client interfaces
  - remote: buf.build/grpc/go:v1.6.1
    out: internal/pkg/pb
    opt:
      - paths=source_relative
      - require_unimplemented_servers=true   # enforces embedding Unimplemented*

  # 3. HTTP reverse proxy (grpc-gateway) — replaces any custom framework
  - remote: buf.build/grpc-ecosystem/gateway:v2.28.0
    out: internal/pkg/pb
    opt:
      - paths=source_relative
      - generate_unbound_methods=true

  # 4. OpenAPI/Swagger spec
  - remote: buf.build/grpc-ecosystem/openapiv2:v2.28.0
    out: internal/pkg/pb
    opt:
      - generate_unbound_methods=true
      - fqn_for_openapi_name=true

inputs:
  - directory: api