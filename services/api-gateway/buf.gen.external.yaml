version: v2
clean: true
plugins:
  # Only need message structs + gRPC client interfaces for upstream services
  # No gateway generation — we're the client, not the server
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: internal/pkg/pb/external
    opt: paths=source_relative
  - remote: buf.build/grpc/go:v1.6.1
    out: internal/pkg/pb/external
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false  # clients only — correct
inputs:
  - directory: ../ad-service/api
  - directory: ../order-service/api